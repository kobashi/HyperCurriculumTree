<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>情報メディア学科 履修計画チェッカー</title>
    <link rel="stylesheet" href="styles.css?v=playful-ux-20260617u">
  </head>
  <body>
    <div id="fxLayer" aria-hidden="true"></div>
    <main class="app-shell">
      <section class="topbar" aria-label="設定">
        <div>
          <p class="eyebrow">Nagoya Bunri University</p>
          <h1>情報メディア学科 履修計画チェッカー</h1>
        </div>
        <div class="controls">
          <label>
            コース
            <select id="courseSelect"></select>
          </label>
          <label>
            通算GPA条件
            <select id="gpaInput">
              <option value="1" selected>1.0以上</option>
              <option value="0.9">1.0未満</option>
              <option value="3.7">3.7以上</option>
            </select>
          </label>
          <label>
            2年次GPA条件
            <select id="secondYearGpaInput">
              <option value="1" selected>1.0以上</option>
              <option value="0.9">1.0未満</option>
              <option value="3.7">3.7以上</option>
            </select>
          </label>
          <label class="switch">
            <input id="teacherToggle" type="checkbox">
            <span>教職課程</span>
          </label>
          <label class="switch audio-switch">
            <input id="fxToggle" type="checkbox" checked>
            <span>SE</span>
          </label>
          <label class="switch audio-switch">
            <input id="bgmToggle" type="checkbox" checked>
            <span>BGM</span>
          </label>
        </div>
      </section>

      <section class="summary-grid" aria-label="卒業要件">
        <article class="meter-card">
          <div class="meter-head">
            <span>卒業要件単位</span>
            <strong id="totalCredits">0 / 124</strong>
          </div>
          <div class="meter"><span id="totalMeter"></span></div>
          <div class="meter-detail" id="totalDetail">要件外 0単位</div>
        </article>
        <article class="meter-card">
          <div class="meter-head">
            <span>基礎教育</span>
            <strong id="basicCredits">0 / 36</strong>
          </div>
          <div class="meter"><span id="basicMeter"></span></div>
        </article>
        <article class="meter-card">
          <div class="meter-head">
            <span>専門教育</span>
            <strong id="professionalCredits">0 / 36</strong>
          </div>
          <div class="meter"><span id="professionalMeter"></span></div>
        </article>
        <article class="meter-card">
          <div class="meter-head">
            <span>その他</span>
            <strong id="otherCredits">0 / 52</strong>
          </div>
          <div class="meter"><span id="otherMeter"></span></div>
        </article>
      </section>

      <section class="workspace">
        <aside class="catalog-panel" aria-label="科目一覧">
          <div class="panel-head">
            <h2>科目</h2>
            <div class="catalog-tools">
              <label class="view-mode-switch" for="viewModeToggle">
                <span class="view-mode-switch-label">ツリー</span>
                <input id="viewModeToggle" class="view-mode-switch-input" type="checkbox" aria-label="ツリー表示">
                <span class="view-mode-switch-track" aria-hidden="true">
                  <span class="view-mode-switch-thumb"></span>
                </span>
                <span id="viewModeValue" class="view-mode-switch-value">OFF</span>
              </label>
              <button id="filterToggle" class="tree-option filter-toggle" type="button" aria-expanded="false" aria-controls="catalogFilters">絞込</button>
              <label id="treeCodeToggleWrap" class="tree-option" hidden>
                <input id="treeCodeToggle" type="checkbox">
                <span>番号</span>
              </label>
              <label id="treeMetaToggleWrap" class="tree-option" hidden>
                <input id="treeMetaToggle" type="checkbox">
                <span>補足</span>
              </label>
              <div id="catalogFilters" class="catalog-filters" aria-label="科目表示フィルタ" hidden>
                <fieldset>
                  <legend>絞込</legend>
                  <label><input class="year-filter" type="checkbox" value="1" checked>1年</label>
                  <label><input class="year-filter" type="checkbox" value="2" checked>2年</label>
                  <label><input class="year-filter" type="checkbox" value="3" checked>3年</label>
                  <label><input class="year-filter" type="checkbox" value="4" checked>4年</label>
                  <label><input class="term-filter" type="checkbox" value="前" checked>前期</label>
                  <label><input class="term-filter" type="checkbox" value="後" checked>後期</label>
                  <label><input class="category-filter" type="checkbox" value="basicRequired" checked>基礎教育必修</label>
                  <label><input class="category-filter" type="checkbox" value="basicElective" checked>基礎教育選択</label>
                  <label><input class="category-filter" type="checkbox" value="commonRequired" checked>専門教育コース共通必修</label>
                  <label><input class="category-filter" type="checkbox" value="courseRequired" checked>専門教育コース必修</label>
                  <label><input class="category-filter" type="checkbox" value="specializedElective" checked>専門教育選択</label>
                  <label><input class="category-filter" type="checkbox" value="otherDept">他学科履修</label>
                  <label><input class="category-filter" type="checkbox" value="teacher">教職課程に関する科目</label>
                </fieldset>
              </div>
            </div>
          </div>
          <div id="catalogList" class="catalog-list"></div>
          <div id="treeView" class="tree-view catalog-tree" hidden></div>
        </aside>

        <section class="plan-panel" aria-label="4年間の履修計画">
          <div class="plan-head">
            <h2>4年間の履修計画</h2>
            <div class="quick-actions">
              <button id="autoFillButton" type="button" onpointerdown="window.hctAutoFillButton && window.hctAutoFillButton(event)" onclick="window.hctAutoFillButton && window.hctAutoFillButton(event)">標準配置</button>
              <button id="clearButton" type="button" onpointerdown="window.hctClearButton && window.hctClearButton(event)" onclick="window.hctClearButton && window.hctClearButton(event)">クリア</button>
            </div>
          </div>
          <div id="planGrid" class="plan-grid"></div>
        </section>

        <aside class="status-panel" aria-label="判定">
          <h2>判定</h2>
          <div id="requirementsList" class="requirements"></div>
          <label class="manual-credits">
            その他認定単位
            <input id="manualOtherInput" type="number" min="0" max="80" step="1" value="0">
          </label>
          <div id="alertsList" class="alerts"></div>
        </aside>
      </section>
    </main>

    <script src="app.js?v=playful-ux-20260617u"></script>
  </body>
</html>
